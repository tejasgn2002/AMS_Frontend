<div class="container">
        
    <div class="Login-form">
      <h1>Admin Login</h1>
    <form (ngSubmit)="onSubmit()" #adminLoginForm="ngForm">  
      Admin Id: <br />
      <input
        type="number"
        class="input-field"
        name="adminId"
        placeholder="AdminId"
        [(ngModel)]="adminId"
        (click) = "onClick()"
        required
      /><br />
      Password: <br />
      <input
        type="password"
        class="input-field"
        name="password"
        placeholder="Password"
        [(ngModel)]="password"
         (click) = "onClick()"
        required
      /><br />
      <div style="color: rgb(255, 0, 0); font-weight: bold;">{{message}}</div><br />
  
      <input
        type="submit"
        class="input-field-submit"
        value="Login"
      /><br /><br />
    </form>
  </div>

</div>
